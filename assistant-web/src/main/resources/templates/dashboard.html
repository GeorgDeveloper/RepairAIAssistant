<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repair AI Assistant</title>
    <link rel="stylesheet" href="static/styles/style.css">
    <link rel="stylesheet" href="static/styles/dashboard.css">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.11.2/themes/smoothness/jquery-ui.css" />
</head>

<body class="online-dashboard-screen infopanel-screen">

    <div th:replace="~{fragments/navigation :: nav}"></div>

    <div class="total-content">
        <div class="header">
            <div class="user_logo">
                Привет, <a href="#">user</a>
            </div>
        </div>

        <div class="main-content online-dashboard-page">
            <div class="container online-dashboard-container">
                <div class="dashboard-grid online-dashboard-grid">
                    <div class="left-stack">
                        <div class="table-container-metrics">
                            <div class="chart-container-metrics">
                                <div id="metricsTable-lines"></div>
                            </div>
                        </div>
                    </div>
                    <div class="right-stack">
                        <div class="table-container-metrics">
                            <div class="chart-container-metrics">
                                <div id="metricsTable"></div>
                            </div>
                        </div>
                        <div class="chart-container-metrics">
                            <h3 id="topBreakdownsHeader">Топ поломок за сутки</h3>
                            <div id="topBreakdownsTable"></div>
                            <h3 id="topBreakdownsCurrentHeader">Топ поломок — <span id="currentDateSpan"></span></h3>
                            <div id="topBreakdownsCurrentTable"></div>
                        </div>
                    </div>
                    <div class="new-right-stack">
                        <div class="chart-container-metrics">
                            <h3>Текущие наряды на работы</h3>
                            <div class="downtime-legend">
                                <span class="legend-item">
                                    <span class="legend-color downtime-electrical"></span>
                                    Электрика
                                </span>
                                <span class="legend-item">
                                    <span class="legend-color downtime-electronic"></span>
                                    Электроника
                                </span>
                                <span class="legend-item">
                                    <span class="legend-color downtime-mechanical"></span>
                                    Механика
                                </span>
                            </div>
                            <div id="workOrdersTable"></div>
                        </div>
                    </div>
                </div>
            </div>
		</div>
    </div>

    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.11.2/jquery-ui.min.js"></script>
    <script src="/static/lib/jquery.canvasjs.min.js"></script>
    <script src="static/scripts/dashboard.js"></script>
    <script src="static/scripts/dashboard-main.js"></script>
</body>

</html>
