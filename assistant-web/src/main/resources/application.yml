# Конфигурация для assistant-web
server:
  port: ${server.web.port:8081}
  tomcat:
    # Иначе Tomcat может отдать 413 раньше, чем сработает spring.servlet.multipart
    max-http-post-size: 60MB
    max-swallow-size: 60MB

spring:
  # Не импортируем корневой файл, чтобы избежать дублирования URL ядра в веб-модуле
  config:
    import: ''
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

# URL ядра (assistant-core) для проксирования запросов из веб-интерфейса
core:
  service:
    url: http://localhost:${server.core.port:8080}

# URL модуля обновления базы данных (assistant-base_update) для API нарядов
base-update:
  service:
    url: http://localhost:${server.base_update.port:8084}

# Доступ к странице корректировки производственных дней только по паролю
app:
  production-days-correction:
    password: ${PRODUCTION_DAYS_CORRECTION_PASSWORD:kadmin}
  energy-import:
    password: ${ENERGY_IMPORT_PASSWORD:eadmin}